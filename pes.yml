openapi: 3.0.0
paths:
  /health:
    get:
      operationId: MiscController_getHealth
      summary: Health check
      parameters: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
      tags: &a1
        - Misc
  /info:
    get:
      operationId: MiscController_getInfo
      summary: Get server info
      parameters: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfoResponse"
      tags: *a1
  /status:
    get:
      operationId: MiscController_getStatus
      summary: Get current server status
      parameters: []
      responses:
        "200":
          description: Server status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatusResponse"
      tags: *a1
      security:
        - bearer: []
  /metrics:
    get:
      operationId: PrometheusController_index
      parameters: []
      responses:
        "200":
          description: ""
      security:
        - basic-auth: []
      tags:
        - Metrics
  /customer:
    get:
      operationId: CustomerController_list
      summary: Get all Customers
      parameters:
        - name: take
          required: false
          in: query
          description: Number of records to take
          schema:
            example: 10
            type: number
        - name: page
          required: false
          in: query
          description: Page number
          schema:
            example: 1
            type: number
        - name: order
          required: false
          in: query
          description: Order direction
          schema:
            example: ASC
            enum:
              - ASC
              - DESC
            type: string
        - name: externalId
          required: false
          in: query
          description: externalId
          schema:
            nullable: true
            type: string
        - name: debitorId
          required: false
          in: query
          description: debitorId
          schema:
            nullable: true
            type: number
        - name: search
          required: false
          in: query
          description: Search across all master data fields (LIKE %...%)
          schema:
            nullable: true
            type: string
      responses:
        "200":
          description: List of customers retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReturnOfCustomerResponseDto"
      tags: &a2
        - Customer
      security: &a3
        - bearer: []
    post:
      operationId: CustomerController_create
      summary: Create a Customer
      description: Creates a new customer. If `bic` and `bankName` are not provided,
        they will be automatically derived from the `iban`. You can also provide
        them explicitly to override the automatic derivation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerDto"
      responses:
        "201":
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponseDto"
      tags: *a2
      security: *a3
  /customer/export:
    get:
      operationId: CustomerController_export
      summary: Export all Customers
      description: "Exports all customers in the selected format. Supported formats:
        DATEV (Debitoren/Kreditoren EXTF CSV, format version 3)."
      parameters:
        - name: format
          required: true
          in: query
          description: Export format
          schema:
            example: datev
            enum:
              - datev
            type: string
      responses:
        "200":
          description: Customer export file
      tags: *a2
      security: *a3
  /customer/{id}:
    get:
      operationId: CustomerController_read
      summary: Get Customer by ID
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Customer retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponseDto"
        "404":
          description: Customer not found
      tags: *a2
      security: *a3
    patch:
      operationId: CustomerController_update
      summary: Update Customer by ID
      description: Updates an existing customer. If a new `iban` is provided, and
        `bic` or `bankName` are not explicitly included in the request, they
        will be automatically derived from the new `iban`, overwriting any
        previously stored values. Explicitly provided `bic` or `bankName` will
        always take precedence.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerDto"
      responses:
        "200":
          description: Customer updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponseDto"
        "404":
          description: Customer not found
      tags: *a2
      security: *a3
    delete:
      operationId: CustomerController_delete
      summary: Delete Customer by ID
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: Customer deleted successfully
        "404":
          description: Customer not found
      tags: *a2
      security: *a3
